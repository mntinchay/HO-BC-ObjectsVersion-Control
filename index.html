function escapeAttr(s){ return String(s).replace(/"/g,'&quot;'); }

function addDraftObject(){
  const firstType = DB.settings.objectTypes[0];
  if(!firstType){ toast('Define an object type in Settings first.', 'warning'); return; }
  const nextId = nextAvailableId(firstType.id, editingEntity?editingEntity.id:null);
  if(nextId!=null) markRangeUsed(firstType.id, nextId);
  draftObjects.push({id:uid(), objectType:firstType.id, objectId:nextId, description:''});
  renderObjRows();
}
// The 'last used' pointer per type is what makes IDs adjustable from Settings — it's a hint
// for where to resume handing out numbers, not a hard source of truth (nextAvailableId still
// double-checks against everything actually in use before returning an ID).
function markRangeUsed(typeId, id){
  const range = rangeFor(typeId);
  if(!range || id==null) return;
  if(range.last==null || id>range.last) range.last = id;
}
function renderObjRows(){
  const wrap = document.getElementById('objRowsWrap');
  if(!wrap) return;
  const dis = entityReadOnly ? 'disabled' : '';
  // Flag any (type, id) pair that appears more than once in this entity's own object list —
  // this is the exact condition that produced two rows both reading e.g. COD99001.
  const seen = {};
  draftObjects.forEach(o=>{ if(o.objectId!=null){ const k=o.objectType+'#'+o.objectId; seen[k]=(seen[k]||0)+1; } });
  wrap.innerHTML = draftObjects.length ? `
    <table class="obj-table">
      <thead><tr><th>Type</th><th>Object ID</th><th>Description</th>${entityReadOnly?'':'<th></th>'}</tr></thead>
      <tbody>
      ${draftObjects.map(o=>{
        const exhausted = o.objectId===null;
        const isDup = o.objectId!=null && seen[o.objectType+'#'+o.objectId] > 1;
        return `
        <tr class="obj-row ${isDup?'obj-row-dup':''}" data-oid="${o.id}">
          <td>
            <select class="obj-type-select" ${dis}>
              ${DB.settings.objectTypes.map(t=>`<option value="${t.id}" ${t.id===o.objectType?'selected':''}>${t.name} (${t.code})</option>`).join('')}
            </select>
          </td>
          <td class="obj-id-cell">${exhausted? '<span style="color:var(--danger);">range full</span>' : (typeById(o.objectType)?typeById(o.objectType).code:'')+o.objectId}${isDup?` <span style="color:var(--danger);font-weight:700;" title="Duplicate ID — already used elsewhere in this record">${icon('alert')} duplicate</span>`:''}</td>
          <td><input type="text" class="obj-desc-input" ${dis} placeholder="Description (optional)" value="${escapeAttr(o.description||'')}"></td>
          ${entityReadOnly?'':`<td class="obj-actions"><button class="btn btn-icon btn-sm btn-ghost obj-remove-btn">${icon('trash')}</button></td>`}
        </tr>`;
      }).join('')}
      </tbody>
    </table>` : `<div class="hint" style="padding:10px 2px;">No objects added yet.</div>`;

  if(entityReadOnly) return;
  wrap.querySelectorAll('.obj-type-select').forEach(sel=>{
    sel.addEventListener('change', e=>{
      const row = e.target.closest('.obj-row'); const oid = row.dataset.oid;
      const draft = draftObjects.find(d=>d.id===oid);
      draft.objectType = e.target.value;
      draft.objectId = nextAvailableId(draft.objectType, editingEntity?editingEntity.id:null, draft.id);
      if(draft.objectId!=null) markRangeUsed(draft.objectType, draft.objectId);
      renderObjRows();
    });
  });
  wrap.querySelectorAll('.obj-desc-input').forEach(inp=>{
    inp.addEventListener('input', e=>{
      const row = e.target.closest('.obj-row'); const oid = row.dataset.oid;
      draftObjects.find(d=>d.id===oid).description = e.target.value;
    });
  });
  wrap.querySelectorAll('.obj-remove-btn').forEach(btn=>{
    btn.addEventListener('click', e=>{
      const row = e.target.closest('.obj-row'); const oid = row.dataset.oid;
      draftObjects = draftObjects.filter(d=>d.id!==oid);
      renderObjRows();
    });
  });
}

function saveEntity(kind, existing){
  const name = document.getElementById('entName').value.trim();
  if(!name){ toast('Please enter a name.', 'warning'); return; }
  if(draftObjects.some(o=>o.objectId===null)){ toast('One or more objects have no free ID left in their range. Remove them or widen the range in Settings.', 'danger'); return; }
  const dupCheck = {};
  const dupNames = [];
  draftObjects.forEach(o=>{
    if(o.objectId==null) return;
    const k = o.objectType+'#'+o.objectId;
    dupCheck[k] = (dupCheck[k]||0)+1;
    if(dupCheck[k]===2){ const t=typeById(o.objectType); dupNames.push(`${t?t.code:'?'}${o.objectId}`); }
  });
  if(dupNames.length){ toast(`Can't save — duplicate object ID(s): ${dupNames.join(', ')}. Each object must have a unique ID within this record.`, 'danger'); return; }
  const status = document.getElementById('entStatus').value;
  const remarks = document.getElementById('entRemarksInline').value.trim();

  const revision = Math.max(0, parseInt(document.getElementById('verRevision').value, 10) || 0);
  let major = 0, minor = 0;
  if(kind==='project'){
    major = Math.max(0, parseInt(document.getElementById('verMajor').value, 10) || 0);
    minor = Math.max(0, parseInt(document.getElementById('verMinor').value, 10) || 0);
  }
  const repoUrl = kind==='project' ? document.getElementById('entRepoUrl').value.trim() : '';

  if(existing){
    existing.name = name; existing.status = status; existing.remarks = remarks;
    existing.objects = draftObjects.map(o=>({id:o.id, objectType:o.objectType, objectId:o.objectId, description:o.description}));
    if(kind==='project'){ existing.major = major; existing.minor = minor; existing.revision = revision; existing.repoUrl = repoUrl; }
    else { existing.revision = revision; }
    existing.updatedAt = new Date().toISOString();
    pushHistory(existing, 'Updated');
    log('Updated', kind, name, `Version now ${versionOf(existing)}`);
    toast(`${cap(kind)} updated — now v${versionOf(existing)}`, 'success');
  } else {
    let entity;
    const now = new Date().toISOString();
    if(kind==='project'){
      entity = {id:uid(), kind:'project', projectNo:nextProjectNo(), major, minor, revision, name, status, remarks, repoUrl, objects:[], createdAt:now, updatedAt:now, history:[]};
    } else if(kind==='ticket'){
      const {yy,mm}=yymm();
      entity = {id:uid(), kind:'ticket', year:yy, month:mm, ticketNo:nextTicketNo(yy,mm), revision, name, status, remarks, objects:[], createdAt:now, updatedAt:now, history:[]};
    } else {
      const {yy,mm}=yymm();
      entity = {id:uid(), kind:'storecust', year:yy, month:mm, changeNo:nextChangeNo(yy,mm), revision, name, status, remarks, objects:[], createdAt:now, updatedAt:now, history:[]};
    }
    entity.objects = draftObjects.map(o=>({id:o.id, objectType:o.objectType, objectId:o.objectId, description:o.description}));
    pushHistory(entity, 'Created');
    listOf(kind).push(entity);
    log('Created', kind, name, `Version ${versionOf(entity)}`);
    toast(`${cap(kind)} "${name}" created — v${versionOf(entity)}`, 'success');
  }
  saveDB();
  closeModal();
  render();
}

function deleteEntity(kind, id){
  const item = listOf(kind).find(e=>e.id===id);
  if(!item) return;
  confirmModal(`Delete this ${kind}?`, `"${displayName(item)}" (${displayCode(item)}) and its object allocations will be permanently removed.`, ()=>{
    if(kind==='project') DB.projects = DB.projects.filter(e=>e.id!==id);
    if(kind==='ticket') DB.tickets = DB.tickets.filter(e=>e.id!==id);
    if(kind==='storecust') DB.storecust = DB.storecust.filter(e=>e.id!==id);
    log('Deleted', kind, displayName(item));
    saveDB(); toast(`${cap(kind)} deleted.`, 'danger'); render();
  });
}

function confirmModal(title, body, onConfirm){
  openModal(`
    <div class="modal" style="max-width:440px;">
      <div class="modal-head"><h3>${title}</h3><button class="close-x" id="modalClose">${icon('close')}</button></div>

      <div class="modal-foot"><button class="btn" id="modalCancel">Cancel</button><button class="btn btn-danger" id="modalConfirm">Confirm</button></div>
    </div>`);
  document.getElementById('modalClose').onclick = closeModal;
  document.getElementById('modalCancel').onclick = closeModal;
  document.getElementById('modalConfirm').onclick = ()=>{ closeModal(); onConfirm(); };
}

/* ---------------------------- USER FORM ---------------------------- */
function openUserModal(userId){
  const existing = userId ? DB.users.find(u=>u.id===userId) : null;
  const p = existing ? existing.permissions : perm({
    projects:{view:true,create:true,modify:false,delete:false},
    tickets:{view:true,create:true,modify:false,delete:false},
    storecust:{view:true,create:true,modify:false,delete:false},
    objects:{view:true,create:true,modify:false,delete:false},
    setup:none(),
  });
  const cats = [['projects','Projects'],['tickets','Tickets'],['storecust','Store Customization'],['objects','Objects'],['setup','Setup / Settings']];
  const policy = passwordPolicy();

  openModal(`
    <div class="modal" style="max-width:640px;">
      <div class="modal-head"><h3>${existing?'Edit User':'Add User'}</h3><button class="close-x" id="modalClose">${icon('close')}</button></div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-row"><label>Full Name</label><input type="text" id="uName" value="${existing?escapeAttr(existing.name):''}"></div>
          <div class="form-row"><label>Email</label><input type="email" id="uEmail" value="${existing?escapeAttr(existing.email):''}"></div>
        </div>
        <div class="form-row"><label>Role Label</label><input type="text" id="uRole" value="${existing?escapeAttr(existing.role):'Developer'}" placeholder="e.g. Developer, QA, Lead"></div>

        <div class="section-title" style="margin-top:16px;"><h3 style="font-size:13.5px;">Password</h3><span class="hint">Min ${policy.minLength} chars${policy.requireUppercase?', 1 uppercase':''}${policy.requireNumber?', 1 number':''}${policy.requireSymbol?', 1 symbol':''}</span></div>
        <div class="form-grid">
          <div class="form-row">
            <label>${existing?'Set New Password':'Temporary Password'} <span class="hint">${existing?'(leave blank to keep current)':'(leave blank to auto-generate)'}</span></label>
            <input type="password" id="uPassword" autocomplete="new-password">
          </div>
          <div class="form-row">
            <label>Confirm Password</label>
            <input type="password" id="uPasswordConfirm" autocomplete="new-password">
          </div>
        </div>
        <div class="checkbox-row" style="margin:-6px 0 10px;">
          <div class="toggle ${(!existing || existing.mustChangePassword)?'on':''}" id="uMustChange"></div>
          <span>Require password change at ${existing?'next':'first'} login</span>
        </div>
        <div id="uPasswordError" style="font-size:12px;color:var(--danger);margin:-4px 0 10px;"></div>

        <div class="section-title" style="margin-top:6px;"><h3 style="font-size:13.5px;">Permissions</h3><span class="hint">Toggle what this user can View / Create / Modify / Delete — turn a category's View off for a view-only-restricted, or fully hidden, section</span></div>
        <div class="table-wrap">
        <table>
          <thead><tr><th>Category</th><th style="text-align:center;">View</th><th style="text-align:center;">Create</th><th style="text-align:center;">Modify</th><th style="text-align:center;">Delete</th></tr></thead>
          <tbody>
          ${cats.map(([cid,label])=>`
            <tr>
              <td>${label}</td>
              ${['view','create','modify','delete'].map(a=>`<td style="text-align:center;"><div class="toggle ${p[cid][a]?'on':''}" data-perm="${cid}:${a}" style="margin:0 auto;"></div></td>`).join('')}
            </tr>`).join('')}
          </tbody>
        </table>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn" id="modalCancel">Cancel</button>
        <button class="btn btn-primary" id="modalSaveUser">${existing?'Save Changes':'Add User'}</button>
      </div>
    </div>`);

  const workingPerm = JSON.parse(JSON.stringify(p));
  document.querySelectorAll('[data-perm]').forEach(t=>{
    t.addEventListener('click', ()=>{
      const [cid,a] = t.dataset.perm.split(':');
      workingPerm[cid][a] = !workingPerm[cid][a];
      t.classList.toggle('on', workingPerm[cid][a]);
      if(a==='view' && !workingPerm[cid].view){
        // Can't create/modify/delete what you can't view.
        ['create','modify','delete'].forEach(other=>{
          workingPerm[cid][other] = false;
          const el = document.querySelector(`[data-perm="${cid}:${other}"]`);
          if(el) el.classList.remove('on');
        });
      } else if(a!=='view' && workingPerm[cid][a] && !workingPerm[cid].view){
        workingPerm[cid].view = true;
        const el = document.querySelector(`[data-perm="${cid}:view"]`);
        if(el) el.classList.add('on');
      }
    });
  });
  let workingMustChange = !existing || existing.mustChangePassword;
  document.getElementById('uMustChange').addEventListener('click', function(){
    workingMustChange = !workingMustChange;
    this.classList.toggle('on', workingMustChange);
  });
  document.getElementById('modalClose').onclick = closeModal;
  document.getElementById('modalCancel').onclick = closeModal;
  document.getElementById('modalSaveUser').onclick = async ()=>{
    const errEl = document.getElementById('uPasswordError');
    errEl.textContent = '';
    const name = document.getElementById('uName').value.trim();
    const email = document.getElementById('uEmail').value.trim();
    const role = document.getElementById('uRole').value.trim() || 'Developer';
    if(!name){ toast('Please enter a name.', 'warning'); return; }
    const pw = document.getElementById('uPassword').value;
    const pwConfirm = document.getElementById('uPasswordConfirm').value;
    if(pw || pwConfirm){
      if(pw !== pwConfirm){ errEl.textContent='Passwords do not match.'; return; }
      const {valid} = validatePassword(pw);
      if(!valid){ errEl.textContent='Password does not meet the policy requirements.'; return; }
    }

    let generatedPw = null;
    if(existing){
      existing.name=name; existing.email=email; existing.role=role; existing.permissions=workingPerm;
      existing.mustChangePassword = workingMustChange;
      if(pw){ existing.passwordHash = await sha256Hex(pw); existing.passwordUpdatedAt = new Date().toISOString(); }
      log('Updated', 'user', name);
      saveDB(); closeModal(); render();
      toast('User updated.', 'success');
    } else {
      let finalPw = pw;
      if(!finalPw){ finalPw = genTempPassword(); generatedPw = finalPw; }
      const hash = await sha256Hex(finalPw);
      DB.users.push({id:uid(), name, email, role, permissions:workingPerm, passwordHash:hash, mustChangePassword:workingMustChange, passwordUpdatedAt:null});
      log('Created', 'user', name);
      saveDB(); closeModal(); render();
      if(generatedPw){
        openModal(`
          <div class="modal" style="max-width:440px;">
            <div class="modal-head"><h3>Temporary password generated</h3><button class="close-x" id="modalClose">${icon('close')}</button></div>
            <div class="modal-body">
              <p style="font-size:13px;color:var(--text-dim);margin-bottom:12px;">Share this with <b>${escapeAttr(name)}</b> — it won't be shown again.</p>
              <div class="readonly-field" style="text-align:center;font-size:16px;letter-spacing:.05em;">${generatedPw}</div>
            </div>
            <div class="modal-foot"><button class="btn btn-primary" id="modalGenOk">Done</button></div>
          </div>`);
        document.getElementById('modalClose').onclick = closeModal;
        document.getElementById('modalGenOk').onclick = closeModal;
      } else {
        toast('User added.', 'success');
      }
    }
  };
}
function deleteUser(userId){
  const u = DB.users.find(x=>x.id===userId);
  if(!u) return;
  if(DB.users.length<=1){ toast("Can't delete the last remaining user.", 'warning'); return; }
  confirmModal('Remove user?', `"${u.name}" will lose access to this workspace.`, ()=>{
    DB.users = DB.users.filter(x=>x.id!==userId);
    if(DB.currentUserId===userId) DB.currentUserId = DB.users[0].id;
    log('Deleted', 'user', u.name);
    saveDB(); toast('User removed.', 'danger'); render();
  });
}

      if(!r){ r = {typeId:tid, from, to, last}; DB.settings.idRanges.push(r); } else { r.from=from; r.to=to; r.last=last; }
    });
    if(!ok){ toast('Check that every "To" is greater than or equal to "From", and "Last No. Used" falls within that range.', 'warning'); return; }
    saveDB(); log('Updated','settings','ID ranges'); toast('Ranges saved.', 'success'); render();
  });

  const workingPolicy = JSON.parse(JSON.stringify(passwordPolicy()));
  document.querySelectorAll('[data-pp]').forEach(t=>{
    t.addEventListener('click', ()=>{
      const key = t.dataset.pp;
      workingPolicy[key] = !workingPolicy[key];
      t.classList.toggle('on', workingPolicy[key]);
    });
  });
  const savePasswordPolicy = document.getElementById('savePasswordPolicy');
  if(savePasswordPolicy) savePasswordPolicy.addEventListener('click', ()=>{
    const minLength = parseInt(document.getElementById('ppMinLength').value,10);
    DB.settings.passwordPolicy = { minLength: isNaN(minLength)?8:Math.max(4,minLength), requireUppercase:workingPolicy.requireUppercase, requireNumber:workingPolicy.requireNumber, requireSymbol:workingPolicy.requireSymbol };
    saveDB(); log('Updated','settings','Password policy'); toast('Password policy saved.', 'success'); render();
  });
}

function renderInPlace(){
  // lightweight re-render of just the content area for smooth typing in search boxes.
  // Only rebinds content-scoped handlers (chrome/sidebar listeners stay untouched and unduplicated).
  const content = document.querySelector('.content');
  if(!content) return;
  const prevInput = document.getElementById('searchInput');
  const caret = prevInput ? prevInput.selectionStart : null;
  content.innerHTML = renderView();
  attachContentHandlers();
  const nextInput = document.getElementById('searchInput');
  if(nextInput && caret!==null){ nextInput.focus(); nextInput.setSelectionRange(caret, caret); }
}

function toggleTheme(){
  DB.settings.theme = DB.settings.theme==='dark' ? 'light' : 'dark';
  saveDB(); paint();
}

/* ---------------------------- MANUAL BACKUP EXPORT / IMPORT (JSON) ---------------------------- */
function downloadJson(obj, filename){
  const blob = new Blob([JSON.stringify(obj,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function exportDatabase(){
  downloadJson(DB, `bc-object-version-control-${Date.now()}.json`);
  log('Exported','database','Full workspace database');
  toast('Backup exported. This is a manual snapshot — the live database stays in SharePoint.', 'success');
}
function importDatabase(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try{
      const parsed = JSON.parse(evt.target.result);
      if(!parsed.settings || !parsed.users){ throw new Error('Not a recognized database file'); }
      confirmModal('Replace current data?', 'Importing will overwrite the shared database on SharePoint with the contents of the selected file, for everyone.', ()=>{
        DB = normalizeDB(parsed);
        if(!DB.users.find(u=>u.id===DB.currentUserId)) DB.currentUserId = DB.users[0].id;
        saveDB(); log('Imported','database','Restored from file'); toast('Database imported.', 'success'); render();
      });
    }catch(err){ toast('That file could not be read as a valid database export.', 'danger'); }
  };
  reader.readAsText(file);
}

/* ---------------------------- EXCEL BULK IMPORT / EXPORT ---------------------------- */
function exportExcelWorkbook(){
  if(typeof XLSX==='undefined'){ toast('Excel library failed to load — check your internet connection.', 'danger'); return; }
  const wb = XLSX.utils.book_new();

  const projectsSheet = DB.projects.map(p=>({
    ProjectNo:p.projectNo, Name:p.name, Major:p.major, Minor:p.minor, Revision:p.revision,
    Status:cap(p.status), Remarks:p.remarks||'', RepositoryURL:p.repoUrl||'', Version:versionOf(p), Code:displayCode(p),
  }));
  const ticketsSheet = DB.tickets.map(t=>({
    Year:t.year, Month:t.month, TicketNo:t.ticketNo, Revision:t.revision, Name:t.name,
    Status:cap(t.status), Remarks:t.remarks||'', Version:versionOf(t), Code:displayCode(t),
  }));
  const storecustSheet = DB.storecust.map(o=>({
    Year:o.year, Month:o.month, ChangeNo:o.changeNo, Revision:o.revision, Name:o.name,
    Status:cap(o.status), Remarks:o.remarks||'', Version:versionOf(o), Code:displayCode(o),
  }));
  const objectsSheet = allEntities().flatMap(e => (e.objects||[]).map(o=>({
    OwnerKind:e.kind, OwnerCode:displayCode(e), OwnerName:displayName(e),
    ObjectTypeCode: typeById(o.objectType)?typeById(o.objectType).code:o.objectType,
    ObjectID:o.objectId, Description:o.description||'',
  })));
  const objectTypesSheet = DB.settings.objectTypes.map(t=>{
    const r = rangeFor(t.id)||{from:'',to:''};
    return {Name:t.name, Code:t.code, RangeFrom:r.from, RangeTo:r.to};
  });

  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(projectsSheet), 'Projects');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(ticketsSheet), 'Tickets');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(storecustSheet), 'storecust');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(objectsSheet), 'Objects');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(objectTypesSheet), 'ObjectTypes');

  XLSX.writeFile(wb, `bc-object-version-control-${Date.now()}.xlsx`);
  log('Exported','excel','Workbook (Projects/Tickets/storecust/Objects/ObjectTypes)');
  toast('Workbook exported.', 'success');
}

function normStatus(s){
  s = String(s||'active').trim().toLowerCase();
  return ['active','drafting','pending','obsolete'].includes(s) ? s : 'active';
}
function findOrCreateObjectType(code){
  code = String(code||'').trim().toUpperCase();
  if(!code) return null;
  let t = DB.settings.objectTypes.find(x=>x.code.toUpperCase()===code);
  if(!t){
    const id = 'ot'+uid().slice(0,5);
    t = {id, name:code, code};
    DB.settings.objectTypes.push(t);
    DB.settings.idRanges.push({typeId:id, from:50100, to:50149});
  }
  return t;
}

function importExcelWorkbook(e){
  const file = e.target.files[0];
  if(!file) return;
  if(typeof XLSX==='undefined'){ toast('Excel library failed to load — check your internet connection.', 'danger'); e.target.value=''; return; }
  const reader = new FileReader();
  reader.onload = evt => {
    let wb;
    try{ wb = XLSX.read(evt.target.result, {type:'array'}); }
    catch(err){ toast('That file could not be read as an Excel workbook.', 'danger'); e.target.value=''; return; }

    const sheetJson = name => wb.Sheets[name] ? XLSX.utils.sheet_to_json(wb.Sheets[name], {defval:''}) : [];
    const rowsProjects = sheetJson('Projects');
    const rowsTickets = sheetJson('Tickets');
    const rowsstorecust = sheetJson('storecust');
    const rowsObjects = sheetJson('Objects');
    const rowsObjectTypes = sheetJson('ObjectTypes');

    if(!rowsProjects.length && !rowsTickets.length && !rowsstorecust.length && !rowsObjects.length && !rowsObjectTypes.length){
      toast('No recognizable sheets found (expected Projects / Tickets / storecust / Objects / ObjectTypes).', 'warning');
      e.target.value=''; return;
    }

    confirmModal('Import this workbook?', `Found ${rowsProjects.length} project row(s), ${rowsTickets.length} ticket row(s), ${rowsstorecust.length} storecust row(s), ${rowsObjects.length} object row(s) and ${rowsObjectTypes.length} object type row(s). Existing records with a matching code will be updated in place; everything else is added as new.`, ()=>{
      runExcelImport({rowsProjects, rowsTickets, rowsstorecust, rowsObjects, rowsObjectTypes});
      e.target.value='';
    });
  };
  reader.readAsArrayBuffer(file);
}

function runExcelImport({rowsProjects, rowsTickets, rowsstorecust, rowsObjects, rowsObjectTypes}){
  const now = new Date().toISOString();
  let counts = {types:0, projects:0, tickets:0, storecust:0, objects:0, skipped:0};

  // 1) Object Types + Ranges first, since Objects rows reference them by code
  rowsObjectTypes.forEach(row=>{
    const code = String(row.Code||'').trim().toUpperCase();
    const name = String(row.Name||code||'').trim();
    if(!code) return;
    let t = DB.settings.objectTypes.find(x=>x.code.toUpperCase()===code);
    if(!t){
      const id='ot'+uid().slice(0,5);
      t = {id, name: name||code, code};
      DB.settings.objectTypes.push(t);
      DB.settings.idRanges.push({typeId:t.id, from:Number(row.RangeFrom)||50100, to:Number(row.RangeTo)||50149});
    } else {
      t.name = name || t.name;
      const r = rangeFor(t.id);
      if(r){ if(row.RangeFrom!=='') r.from = Number(row.RangeFrom); if(row.RangeTo!=='') r.to = Number(row.RangeTo); }
    }
    counts.types++;
  });

  // 2) Projects — matched by ProjectNo
  rowsProjects.forEach(row=>{
    const projectNo = Number(row.ProjectNo);
    if(row.ProjectNo===undefined || row.ProjectNo==='' || isNaN(projectNo) || projectNo<0 || !row.Name){ counts.skipped++; return; }
    const numOr = (val, fallback) => { const n = Number(val); return isNaN(n) ? fallback : n; };
    let p = DB.projects.find(x=>x.projectNo===projectNo);
    if(!p){
      p = {id:uid(), kind:'project', projectNo, major:numOr(row.Major,1), minor:numOr(row.Minor,0), revision:numOr(row.Revision,0),
        name:String(row.Name), status:normStatus(row.Status), remarks:String(row.Remarks||''), repoUrl:String(row.RepositoryURL||''), objects:[], createdAt:now, updatedAt:now, history:[]};
      DB.projects.push(p);
      pushHistory(p, 'Imported from Excel');
    } else {
      p.name = String(row.Name); p.major=numOr(row.Major,p.major); p.minor=numOr(row.Minor,p.minor); p.revision=numOr(row.Revision,p.revision);
      p.status = normStatus(row.Status); p.remarks = String(row.Remarks||''); p.repoUrl = row.RepositoryURL!==undefined ? String(row.RepositoryURL||'') : (p.repoUrl||''); p.updatedAt = now;
      pushHistory(p, 'Updated via Excel import');
    }
    counts.projects++;
  });

  // 3) Tickets — matched by Year+Month+TicketNo
  rowsTickets.forEach(row=>{
    const year = pad2(row.Year); const month = pad2(row.Month); const ticketNo = Number(row.TicketNo);
    if(row.TicketNo===undefined || row.TicketNo==='' || isNaN(ticketNo) || ticketNo<0 || !row.Name){ counts.skipped++; return; }
    let t = DB.tickets.find(x=>x.year===year && x.month===month && x.ticketNo===ticketNo);
    if(!t){
      t = {id:uid(), kind:'ticket', year, month, ticketNo, revision:Number(row.Revision)||0,
        name:String(row.Name), status:normStatus(row.Status), remarks:String(row.Remarks||''), objects:[], createdAt:now, updatedAt:now, history:[]};
      DB.tickets.push(t);
      pushHistory(t, 'Imported from Excel');
    } else {
      t.name = String(row.Name); t.revision = (row.Revision!==undefined && row.Revision!=='' && !isNaN(Number(row.Revision))) ? Number(row.Revision) : t.revision;
      t.status = normStatus(row.Status); t.remarks = String(row.Remarks||''); t.updatedAt = now;
      pushHistory(t, 'Updated via Excel import');
    }
    counts.tickets++;
  });

  // 4) storecust — matched by Year+Month+ChangeNo
  rowsstorecust.forEach(row=>{
    const year = pad2(row.Year); const month = pad2(row.Month); const changeNo = Number(row.ChangeNo);
    if(row.ChangeNo===undefined || row.ChangeNo==='' || isNaN(changeNo) || changeNo<0 || !row.Name){ counts.skipped++; return; }
    let o = DB.storecust.find(x=>x.year===year && x.month===month && x.changeNo===changeNo);
    if(!o){
      o = {id:uid(), kind:'storecust', year, month, changeNo, revision:Number(row.Revision)||0,
        name:String(row.Name), status:normStatus(row.Status), remarks:String(row.Remarks||''), objects:[], createdAt:now, updatedAt:now, history:[]};
      DB.storecust.push(o);
      pushHistory(o, 'Imported from Excel');
    } else {
      o.name = String(row.Name); o.revision = (row.Revision!==undefined && row.Revision!=='' && !isNaN(Number(row.Revision))) ? Number(row.Revision) : o.revision;
      o.status = normStatus(row.Status); o.remarks = String(row.Remarks||''); o.updatedAt = now;
      pushHistory(o, 'Updated via Excel import');
    }
    counts.storecust++;
  });

  // 5) Objects — attached to whichever owner (project/ticket/storecust) matches OwnerKind + OwnerCode.
  // Codes can drift out of sync with a workbook exported earlier (e.g. the Code format changes,
  // or someone hand-edits a cell), so matching falls back from an exact code match to a
  // normalized code match to a name match before giving up.
  function findOwnerByCode(kind, code, name){
    const raw = String(code||'').trim().toUpperCase();
    const list = listOf(kind);
    let owner = raw ? list.find(e=>displayCode(e).toUpperCase()===raw) : null;
    if(!owner && raw){
      const norm = raw.replace(/[^A-Z0-9]/g,'');
      if(norm) owner = list.find(e=>displayCode(e).toUpperCase().replace(/[^A-Z0-9]/g,'')===norm);
    }
    if(!owner && name){
      const nm = String(name).trim().toLowerCase();
      if(nm) owner = list.find(e=>String(displayName(e)||'').trim().toLowerCase()===nm);
    }
    return owner;
  }
  let objSkip = {badKind:0, ownerNotFound:0, badId:0, badType:0};
  const missingOwners = [];
  rowsObjects.forEach(row=>{
    const kind = String(row.OwnerKind||'').trim().toLowerCase();
    if(!['project','ticket','storecust'].includes(kind)){ counts.skipped++; objSkip.badKind++; return; }
    const owner = findOwnerByCode(kind, row.OwnerCode, row.OwnerName);
    const objectId = Number(row.ObjectID);
    if(!owner){ counts.skipped++; objSkip.ownerNotFound++; missingOwners.push(String(row.OwnerCode||row.OwnerName||'?')); return; }
    if(row.ObjectID===undefined || row.ObjectID==='' || isNaN(objectId) || objectId<0){ counts.skipped++; objSkip.badId++; return; }
    const type = findOrCreateObjectType(row.ObjectTypeCode);
    if(!type){ counts.skipped++; objSkip.badType++; return; }
    owner.objects = owner.objects || [];
    const dup = owner.objects.find(o=>o.objectType===type.id && o.objectId===objectId);
    if(!dup){
      owner.objects.push({id:uid(), objectType:type.id, objectId, description:String(row.Description||'')});
      markRangeUsed(type.id, objectId);
      counts.objects++;
    } else {
      dup.description = String(row.Description||dup.description||'');
    }
  });

  saveDB();
  log('Imported','excel', 'Workbook', `Projects:${counts.projects} Tickets:${counts.tickets} storecust:${counts.storecust} Objects:${counts.objects} Types:${counts.types} Skipped:${counts.skipped}`);
  toast(`Imported: ${counts.projects} project(s), ${counts.tickets} ticket(s), ${counts.storecust} storecust(s), ${counts.objects} object(s)${counts.skipped?`, ${counts.skipped} row(s) skipped`:''}.`, 'success');
  if(objSkip.ownerNotFound){
    toast(`${objSkip.ownerNotFound} object row(s) skipped — owner not found: ${missingOwners.slice(0,5).join(', ')}${missingOwners.length>5?', …':''}. Check the OwnerCode/OwnerKind columns match an existing Project/Ticket/storecust.`, 'warning');
  }
  render();
}

  app.innerHTML = `

    <div class="glass auth-card" style="text-align:center;">

      <button class="btn btn-primary" id="retryConnectBtn" style="width:100%;justify-content:center;">Try Again</button>
      <p style="font-size:11px;color:var(--text-faint);margin-top:14px;">This app keeps no local copy — nothing to fall back to until the connection succeeds.</p>
    </div>
  </div>`;

}

/* ---------------------------- APP ENTRY POINT ---------------------------- */
async function initApp(){
  if(IS_LOCAL_DEV){
    renderConnecting('Local access mode — loading guest session…');
    try{
      const raw = localStorage.getItem(LOCAL_DEV_DB_KEY);
      DB = raw && JSON.parse(raw).users ? JSON.parse(raw) : seedLocalDB();
    }catch(e){ DB = seedLocalDB(); }
    if(!DB.users.some(u=>u.id==='guest')){ DB = seedLocalDB(); } // migrate away from any old predefined-user local data
    DB = normalizeDB(DB);
    if(!localStorage.getItem(LOCAL_DEV_DB_KEY)) saveDB();
    syncStatus = 'synced'; lastSyncedAt = new Date().toISOString();
    // Local access only — skip the login screen and go straight in as Guest.
    sessionStorage.setItem(SESSION_KEY, DB.currentUserId);
    authStage = 'app';
    paint();
    return;
  }
  renderConnecting('Checking Microsoft sign-in…');
  if(!MSAL_CLIENT_ID || !msalInstance){
    let reason = '';
    if(!MSAL_CLIENT_ID) reason = '';
    else if(window.__MSAL_LOAD_FAILED) reason = 'The MSAL script failed to load from the CDN (network blocked, or the CDN is down). Check your internet connection, or open the browser console for the exact network error.';
    else reason = 'MSAL_CLIENT_ID is set, but the MSAL library object was not found on the page — check the browser console for script errors.';
    renderSetupRequired(reason);
    return;
  }
  try{
    try{ await msalInstance.handleRedirectPromise(); }catch(e){}
    renderConnecting('Signing in to Microsoft…');
    await acquireGraphToken(true);
    renderConnecting('Loading the database from SharePoint…');
    const loaded = await loadDbFromSharePoint();
    if(!loaded){
      renderConnectError(`The database file wasn't found in SharePoint. Confirm the "${SP_FOLDER_PATH}" folder and the "${SP_FILE_NAME}" file exist at ${SP_HOSTNAME}${SP_SITE_PATH}, then try again.`);
      return;
    }
    DB = normalizeDB(loaded);
    syncStatus = 'synced'; lastSyncedAt = new Date().toISOString();
    boot();
  }catch(err){
    renderConnectError(err.message || String(err));
  }
}

/* ======================================================================
   BOOT
   ====================================================================== */
if(!IS_AUTH_POPUP){
  initApp();
}
